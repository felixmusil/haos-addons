name: Build add-on image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build & push qobuz-proxy add-on image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Supervisor pulls `{image}:{version}` where {version} is the config.yaml
      # value (no leading "v"), so strip it from the git tag.
      - name: Compute version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./qobuz-proxy
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/qobuz-proxy-haos-addon:latest
            ghcr.io/${{ github.repository_owner }}/qobuz-proxy-haos-addon:${{ steps.ver.outputs.version }}
