name: Qobuz Proxy
version: "1.3.5"
slug: qobuz_proxy
description: Headless Qobuz Connect player that bridges to a DLNA renderer
url: https://github.com/felixmusil/haos-addons/tree/main/qobuz-proxy
arch:
  - aarch64
  - amd64
image: ghcr.io/felixmusil/qobuz-proxy-haos-addon
init: false
host_network: true
boot: auto
ingress: true
ingress_port: 8689
panel_icon: mdi:music-circle
panel_title: Qobuz
webui: "http://[HOST]:[PORT:8689]"
ports:
  8689/tcp: 8689
  7120/tcp: 7120
ports_description:
  8689/tcp: Web UI / Qobuz Connect discovery
  7120/tcp: DLNA audio proxy
options:
  device_name: QobuzProxy
  dlna_ip: ""
  dlna_port: 1400
  dlna_fixed_volume: false
  max_quality: auto
  log_level: info
schema:
  device_name: str
  dlna_ip: str
  dlna_port: port
  dlna_fixed_volume: bool
  max_quality: "list(5|6|7|27|auto)"
  log_level: "list(debug|info|warning|error)"
